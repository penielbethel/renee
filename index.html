<body>
  <!-- Critical Rendering Path Preloader -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1A1A1A;
    }

    #root:empty+#app-preloader {
      display: flex;
    }

    #app-preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #1A1A1A;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease-out;
    }

    .preloader-content {
      text-align: center;
    }

    .preloader-text {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 3rem;
      font-weight: 800;
      color: #D4AF37;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0 0 10px 0;
      animation: pulse 2s infinite;
    }

    .preloader-subtext {
      font-family: sans-serif;
      font-size: 1rem;
      color: #888;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .loading-bar-container {
      width: 200px;
      height: 2px;
      background-color: rgba(212, 175, 55, 0.2);
      margin-top: 30px;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
    }

    .loading-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background-color: #D4AF37;
      animation: progress 3s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    @keyframes progress {
      0% {
        left: -50%;
        width: 50%;
      }

      50% {
        width: 50%;
      }

      100% {
        left: 100%;
        width: 50%;
      }
    }

    @media (max-width: 480px) {
      .preloader-text {
        font-size: 2rem;
      }

      .preloader-subtext {
        font-size: 0.8rem;
      }
    }
  </style>

  <div id="root"></div>

  <!-- Immediate Preloader HTML -->
  <div id="app-preloader">
    <div class="preloader-content">
      <h1 class="preloader-text">Welcome to Renee</h1>
      <p class="preloader-subtext">Premium Agric Food Value Chain</p>
      <div class="loading-bar-container">
        <div class="loading-bar"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
